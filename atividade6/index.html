<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <title>Blog CGI</title>
</head>

<body>

    <h1>Blog</h1>

    <form action="/cgi-bin/blog.py" method="post">
        <input type="text" name="autor" placeholder="Seu nome" required><br><br>
        <textarea name="mensagem" placeholder="Sua mensagem" required></textarea><br><br>
        <button type="submit">Postar</button>
    </form>

    <hr>

    <a href="/cgi-bin/blog.py">Ver postagens</a>

</body>

</html>
